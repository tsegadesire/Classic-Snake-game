<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Snake Game</title>
    <meta
      name="description"
      content="A polished, responsive HTML5 Canvas Snake Game built with modern Vanilla JavaScript."
    />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container">
      <!-- Header Controls & Scores -->
      <header class="top-section">
        <div class="brand">
          <h1>🐍 Snake</h1>
          <span class="version">v1.0.0</span>
        </div>

        <div class="scoreboard">
          <div class="score-box">
            <span class="label">SCORE</span>
            <span id="current-score" class="value">0</span>
          </div>
          <div class="score-box">
            <span class="label">BEST</span>
            <span id="high-score" class="value">0</span>
          </div>
        </div>

        <div class="controls-bar">
          <div class="select-wrapper">
            <label for="difficulty-select" class="sr-only">Difficulty</label>
            <select id="difficulty-select" aria-label="Select Game Difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </div>

          <button id="btn-pause" class="btn" aria-label="Pause Game">
            Pause
          </button>
          <button id="btn-restart" class="btn" aria-label="Restart Game">
            Restart
          </button>
          <button id="btn-mute" class="btn icon-btn" aria-label="Toggle Sound">
            🔊
          </button>
          <button id="btn-theme" class="btn icon-btn" aria-label="Toggle Theme">
            🌙
          </button>
        </div>
      </header>

      <!-- Canvas Game Area -->
      <main class="canvas-wrapper">
        <canvas
          id="game-canvas"
          width="400"
          height="400"
          aria-label="Snake Game Board"
          role="img"
        ></canvas>

        <!-- Overlay Messages -->
        <div id="overlay" class="overlay hidden" aria-live="polite">
          <div id="overlay-content" class="overlay-card">
            <h2 id="overlay-title">Paused</h2>
            <p id="overlay-message">Press Space to resume</p>
            <button id="overlay-btn" class="btn primary-btn">Resume</button>
          </div>
        </div>
      </main>

      <!-- Bottom Section: Instructions & Meta -->
      <section class="bottom-section">
        <div class="card instructions">
          <h3>How to Play</h3>
          <p>
            Guide the snake to eat the apples and grow. Avoid running into the
            walls or your own tail!
          </p>
        </div>

        <div class="card shortcuts">
          <h3>Controls</h3>
          <div class="key-grid">
            <span><kbd>↑</kbd> <kbd>W</kbd> Up</span>
            <span><kbd>↓</kbd> <kbd>S</kbd> Down</span>
            <span><kbd>←</kbd> <kbd>A</kbd> Left</span>
            <span><kbd>→</kbd> <kbd>D</kbd> Right</span>
            <span><kbd>Space</kbd> Pause</span>
            <span><kbd>R</kbd> Restart</span>
            <span><kbd>M</kbd> Mute</span>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <footer class="footer">
        <p>
          Designed & Built by <strong>Your Name</strong> |
          <a
            href="https://github.com/tsegadesire/Classic-Snake-game"
            target="_blank"
            rel="noopener noreferrer"
            >GitHub Repository</a
          >
        </p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
